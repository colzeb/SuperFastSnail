<template>

    <lightning-card>
        <h3 slot="title">
            <lightning-icon icon-name="utility:connected_apps" size="small"></lightning-icon>
            Clone opportunity
        </h3>

        <div class="slds-m-left_medium slds-m-right_medium">
            <h3>test3 {haveResult}</h3>
            <template if:true={haveResult} >
                <h3>inside template {opportunities}</h3>
                <template for:each={opportunities} for:item="contact">
                    <p key={contact.Id}>{contact.Name}</p>
                </template>
            </template>

            <lightning-input type="text" label="Name" required="true"></lightning-input>
            <lightning-input type="date" label="Close Date" required="true"></lightning-input>
            <lightning-input type="text" label="Stage" required="true"></lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button variant="brand" title="Clone" label="Clone"></lightning-button>
                <lightning-button title="Cancel" label="Cancel" onclick={handleCancle}></lightning-button>
            </div>
    </div>
    </lightning-card>
    
</template>
